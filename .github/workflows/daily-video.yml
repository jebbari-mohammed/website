name: Daily YouTube Video

on:
  # Runs every day at 7:00 AM UTC (8:00 AM local time)
  # A random delay of 0-120 minutes is added to publish between 8am and 10am
  schedule:
    - cron: '0 7 * * *'
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-video:
    runs-on: ubuntu-latest
    steps:
      - name: Random delay (0-120 min) for natural timing
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 7200))
          echo "⏳ Waiting ${DELAY} seconds ($(($DELAY / 60)) minutes) before generating..."
          sleep $DELAY

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd tools/ai-marketing && npm install

      - name: Install Playwright browsers
        run: cd tools/ai-marketing && npx patchright install chromium --with-deps

      - name: Set up Cloud SDK
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_CLOUD_JSON }}'
          
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Restore NotebookLM Session State
        run: |
          mkdir -p ~/.local/share/notebooklm-mcp
          gsutil cp gs://ai-gym-coach-notebooklm-state/chrome_profile.tar.gz /tmp/
          tar -xzf /tmp/chrome_profile.tar.gz -C ~/.local/share/notebooklm-mcp/
          # Delete any lock files copied from the Mac that would crash Chrome
          rm -f ~/.local/share/notebooklm-mcp/chrome_profile/SingletonLock
          rm -f ~/.local/share/notebooklm-mcp/chrome_profile/SingletonCookie
          rm -f ~/.local/share/notebooklm-mcp/chrome_profile/SingletonSocket

      - name: Generate and publish video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CI: true
          GITHUB_ACTIONS: true
        run: cd tools/ai-marketing && node daily-review-video.mjs

      - name: Save NotebookLM Session State
        if: always()
        run: |
          cd ~/.local/share/notebooklm-mcp
          tar -czf /tmp/chrome_profile.tar.gz chrome_profile
          gsutil cp /tmp/chrome_profile.tar.gz gs://ai-gym-coach-notebooklm-state/

      - name: Commit and push
        run: |
          git config user.name "AI Marketing Bot"
          git config user.email "bot@youraicoach.life"
          git add -A
          git diff --staged --quiet || git commit -m "🎥 Auto-published daily video $(date +%Y-%m-%d)"
          # Pull latest changes (in case you pushed manually), then push
          git pull --rebase origin main || true
          git push || (sleep 5 && git pull --rebase origin main && git push)
