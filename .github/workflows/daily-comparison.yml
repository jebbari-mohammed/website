name: Daily Competitor Landing Page

on:
  # Runs every day at 7:00 AM UTC (8:00 AM local time)
  # A random delay of 0-120 minutes is added to publish between 8am and 10am
  schedule:
    - cron: '0 7 * * *'
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-comparison:
    runs-on: ubuntu-latest
    steps:
      - name: Random delay (0-120 min) for natural timing
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 7200))
          echo "⏳ Waiting ${DELAY} seconds ($(($DELAY / 60)) minutes) before generating..."
          sleep $DELAY

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd tools/ai-marketing && npm install

      - name: Generate competitor landing page
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CI: true
          GITHUB_ACTIONS: true
        run: node tools/ai-marketing/daily-comparison.mjs

      - name: Commit and push
        run: |
          git config user.name "AI Marketing Bot"
          git config user.email "bot@youraicoach.life"
          git add -A
          git diff --staged --quiet || git commit -m "🚀 Auto-generated competitor landing page $(date +%Y-%m-%d)"
          # Pull latest changes (in case you pushed manually), then push
          git pull --rebase origin main || true
          git push || (sleep 5 && git pull --rebase origin main && git push)
