name: Daily Blog Post

on:
  # Runs every day at 8:00 AM UTC (9:00 AM Morocco time)
  schedule:
    - cron: '0 8 * * *'
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd tools/ai-marketing && npm install

      - name: Generate daily blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CI: true
          GITHUB_ACTIONS: true
        run: node tools/ai-marketing/daily-blog.mjs

      - name: Commit and push
        run: |
          git config user.name "AI Blog Bot"
          git config user.email "bot@youraicoach.life"
          git add -A
          git diff --staged --quiet || git commit -m "📝 Daily blog post $(date +%Y-%m-%d)"
          git push
